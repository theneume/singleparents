services:
  - type: web
    name: adelaide-single-parents-connect
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT vertex_api_server:app
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: PORT
        value: 10000